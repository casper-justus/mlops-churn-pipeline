name: MLOps CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: churn-prediction-api

jobs:
  lint-and-validate:
    name: Lint & Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate project structure
        run: |
          echo "Checking required files exist..."
          test -f requirements.txt && echo "✅ requirements.txt"
          test -f Dockerfile && echo "✅ Dockerfile"
          test -f docker-compose.yml && echo "✅ docker-compose.yml"
          echo "Checking optional source directories..."
          [ -d src ]    && echo "✅ src/ found"    || echo "⚠️  src/ not found (skipping tests)"
          [ -d tests ]  && echo "✅ tests/ found"  || echo "⚠️  tests/ not found (skipping tests)"
          [ -d models ] && echo "✅ models/ found" || echo "⚠️  models/ not found"

      - name: Run tests (if tests/ exists)
        run: |
          if [ -d tests ] && [ -d src ]; then
            pytest tests/ -v --tb=short --junitxml=test-results.xml
          else
            echo "No tests directory found — skipping. Add src/ and tests/ to enable."
          fi

      - name: Train model (if src/ exists)
        run: |
          if [ -f src/train.py ]; then
            python src/train.py
          else
            echo "src/train.py not found — skipping training step."
          fi

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results.xml
          if-no-files-found: ignore

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/churn_model.pkl
          if-no-files-found: ignore

  build-and-push:
    name: Build & Push Docker Image
    needs: lint-and-validate
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      secrets.AWS_ACCESS_KEY_ID != ''
    permissions:
      contents: read
      id-token: write
    outputs:
      image-tag: ${{ steps.build.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download model artifact
        uses: actions/download-artifact@v4
        with:
          name: trained-model
          path: models/

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        id: build
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          docker tag $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest
          echo "image_tag=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  deploy-ec2:
    name: Deploy to EC2 (Terraform)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.AWS_ACCESS_KEY_ID != ''
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Deploy via Terraform
        working-directory: infra/terraform
        run: |
          terraform init
          terraform apply -auto-approve
        env:
          TF_VAR_ecr_image_uri: ${{ needs.build-and-push.outputs.image-tag }}
          TF_VAR_aws_region: ${{ env.AWS_REGION }}

  deploy-lambda:
    name: Deploy to Lambda
    needs: build-and-push
    runs-on: ubuntu-latest
    if: |
      github.ref == 'refs/heads/main' &&
      github.event_name == 'push' &&
      secrets.AWS_ACCESS_KEY_ID != ''
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Package Lambda function
        run: |
          zip -j infra/lambda/lambda_function.zip infra/lambda/lambda_function.py

      - name: Deploy Lambda
        run: |
          aws lambda update-function-code \
            --function-name churn-predictor \
            --zip-file fileb://infra/lambda/lambda_function.zip \
            --region ${{ env.AWS_REGION }}
